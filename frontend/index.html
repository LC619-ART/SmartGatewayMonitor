<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能网关监控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#06b6d4',
                        dark: '#1e293b',
                        light: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .gradient-bg {
                background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            }
            .glass-effect {
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.18);
            }
            .text-gradient {
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                background-image: linear-gradient(to right, #3b82f6, #2563eb);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 头部 -->
        <header class="mb-10">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div>
                    <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-gradient">智能网关监控系统</h1>
                    <p class="text-gray-600 mt-2 text-lg">实时监控环境数据，智能控制设备</p>
                </div>
                <div class="mt-4 md:mt-0 bg-white rounded-full px-6 py-3 card-shadow flex items-center">
                    <i class="fa fa-clock-o text-primary mr-2"></i>
                    <span id="current-time" class="text-gray-800 font-medium"></span>
                </div>
            </div>
        </header>

        <!-- 数据卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <!-- 本地温度 -->
            <div class="bg-white rounded-xl p-6 card-shadow card-hover glass-effect">
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mr-4">
                        <i class="fa fa-thermometer-half text-primary text-2xl"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-700">本地温度</h2>
                </div>
                <div class="mt-2">
                    <span id="local-temp" class="text-3xl font-bold text-gray-800">未知</span>
                    <span class="text-gray-500 ml-1">℃</span>
                </div>
                <div class="mt-4 w-full bg-gray-200 rounded-full h-2">
                    <div id="temp-progress" class="bg-primary h-2 rounded-full" style="width: 50%"></div>
                </div>
            </div>

            <!-- 本地湿度 -->
            <div class="bg-white rounded-xl p-6 card-shadow card-hover glass-effect">
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mr-4">
                        <i class="fa fa-tint text-primary text-2xl"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-700">本地湿度</h2>
                </div>
                <div class="mt-2">
                    <span id="local-humidity" class="text-3xl font-bold text-gray-800">未知</span>
                    <span class="text-gray-500 ml-1">%</span>
                </div>
                <div class="mt-4 w-full bg-gray-200 rounded-full h-2">
                    <div id="humidity-progress" class="bg-primary h-2 rounded-full" style="width: 50%"></div>
                </div>
            </div>

            <!-- 室外温度 -->
            <div class="bg-white rounded-xl p-6 card-shadow card-hover glass-effect">
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mr-4">
                        <i class="fa fa-sun-o text-warning text-2xl"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-700">室外温度</h2>
                </div>
                <div class="mt-2">
                    <span id="weather-temp" class="text-3xl font-bold text-gray-800">未知</span>
                    <span class="text-gray-500 ml-1">℃</span>
                </div>
                <div class="mt-4 w-full bg-gray-200 rounded-full h-2">
                    <div id="weather-temp-progress" class="bg-warning h-2 rounded-full" style="width: 50%"></div>
                </div>
            </div>

            <!-- 天气状况 -->
            <div class="bg-white rounded-xl p-6 card-shadow card-hover glass-effect">
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mr-4">
                        <i class="fa fa-cloud text-info text-2xl"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-700">天气状况</h2>
                </div>
                <div class="mt-2">
                    <span id="weather-text" class="text-2xl font-bold text-gray-800">未知</span>
                </div>
                <div class="mt-4 flex items-center">
                    <i class="fa fa-tint text-info mr-2"></i>
                    <span id="weather-hum" class="text-gray-600">未知</span>
                    <span class="text-gray-500 ml-1">%</span>
                </div>
            </div>
        </div>

        <!-- 控制和数据区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <!-- 设备控制 -->
            <div class="lg:col-span-1 bg-white rounded-xl p-6 card-shadow glass-effect">
                <div class="flex items-center mb-6">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mr-4">
                        <i class="fa fa-sliders text-primary text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-gray-800">设备控制</h2>
                </div>
                <div class="space-y-4">
                    <button id="open-window" class="w-full px-6 py-4 bg-primary text-white rounded-lg font-medium hover:bg-blue-600 transition-all flex items-center justify-center shadow-lg hover:shadow-xl">
                        <i class="fa fa-window-maximize mr-3 text-xl"></i> 
                        <span class="text-lg">开窗</span>
                    </button>
                    <button id="close-window" class="w-full px-6 py-4 bg-gray-600 text-white rounded-lg font-medium hover:bg-gray-700 transition-all flex items-center justify-center shadow-lg hover:shadow-xl">
                        <i class="fa fa-window-minimize mr-3 text-xl"></i> 
                        <span class="text-lg">关窗</span>
                    </button>
                    <button id="auto-mode" class="w-full px-6 py-4 bg-success text-white rounded-lg font-medium hover:bg-green-600 transition-all flex items-center justify-center shadow-lg hover:shadow-xl">
                        <i class="fa fa-magic mr-3 text-xl"></i> 
                        <span class="text-lg">自动模式</span>
                    </button>
                    <button id="ai-mode" class="w-full px-6 py-4 bg-purple-600 text-white rounded-lg font-medium hover:bg-purple-700 transition-all flex items-center justify-center shadow-lg hover:shadow-xl">
                        <i class="fa fa-robot mr-3 text-xl"></i> 
                        <span class="text-lg">AI控制模式</span>
                    </button>
                    <button id="ai-chat" class="w-full px-6 py-4 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-all flex items-center justify-center shadow-lg hover:shadow-xl">
                        <i class="fa fa-comments mr-3 text-xl"></i> 
                        <span class="text-lg">AI助手</span>
                    </button>
                </div>
                <div class="mt-6">
                    <p id="cmd-msg" class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg"></p>
                </div>
            </div>

            <!-- 数据可视化 -->
            <div class="lg:col-span-2 bg-white rounded-xl p-6 card-shadow glass-effect">
                <div class="flex items-center mb-6">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mr-4">
                        <i class="fa fa-line-chart text-primary text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-gray-800">数据可视化</h2>
                </div>
                <div class="h-80">
                    <canvas id="environment-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- 状态和信息 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- 系统状态 -->
            <div class="bg-white rounded-xl p-6 card-shadow glass-effect">
                <div class="flex items-center mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center mr-3">
                        <i class="fa fa-heartbeat text-primary text-xl"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-700">系统状态</h2>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">数据更新状态</span>
                        <span id="update-status" class="text-sm font-medium text-success flex items-center">
                            <i class="fa fa-check-circle mr-1"></i> 已连接
                        </span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">报警状态</span>
                        <span id="alarm-status" class="text-sm font-medium text-success flex items-center">
                            <i class="fa fa-check-circle mr-1"></i> 正常
                        </span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">上次更新</span>
                        <span id="last-update" class="text-sm text-gray-600">刚刚</span>
                    </div>
                </div>
            </div>

            <!-- AI建议 -->
            <div class="bg-white rounded-xl p-6 card-shadow glass-effect">
                <div class="flex items-center mb-4">
                    <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center mr-3">
                        <i class="fa fa-lightbulb-o text-purple-600 text-xl"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-700">AI建议</h2>
                </div>
                <div class="mt-2 p-4 bg-gradient-to-br from-purple-50 to-indigo-50 rounded-lg border border-purple-100">
                    <div id="ai-suggestion" class="text-gray-700 leading-relaxed">
                        <div class="flex items-center justify-center py-4">
                            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-purple-500"></div>
                        </div>
                        <div class="text-center text-gray-500">AI正在分析最佳开关窗策略...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 聊天模态框 -->
    <div id="ai-chat-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] flex flex-col">
            <!-- 模态框头部 -->
            <div class="bg-purple-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                <h3 class="text-xl font-semibold flex items-center">
                    <i class="fa fa-robot mr-2"></i> AI 智能助手
                </h3>
                <button id="close-ai-modal" class="text-white hover:text-gray-200">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <!-- 聊天内容区域 -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- 系统消息 -->
                <div class="flex justify-center">
                    <span class="text-xs text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                        今天 12:00
                    </span>
                </div>
                
                <!-- AI 欢迎消息 -->
                <div class="flex items-start">
                    <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center mr-3 flex-shrink-0">
                        <i class="fa fa-robot text-purple-600"></i>
                    </div>
                    <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">你好！我是智能助手，基于本地部署的 deepseek-r1:8b 模型。我可以根据当前的环境数据，为你提供开关窗的建议。请问有什么可以帮助你的？</p>
                    </div>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="border-t p-4">
                <div class="flex">
                    <input type="text" id="chat-input" placeholder="输入你的问题..." class="flex-1 border border-gray-300 rounded-l-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <button id="send-message" class="bg-purple-600 text-white px-6 py-2 rounded-r-lg hover:bg-purple-700 transition-colors">
                        <i class="fa fa-paper-plane"></i>
                    </button>
                </div>
                <div class="mt-2 text-xs text-gray-500 flex justify-between">
                <span>基于本地部署的 deepseek-r1:8b 模型</span>
            </div>
            </div>
        </div>
    </div>

    <script>
        // 更新当前时间
        function updateCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('current-time').textContent = timeString;
        }

        // 获取数据
        function fetchData() {
            console.log('开始获取数据...');
            fetch('http://localhost:5000/api/data')
                .then(response => {
                    console.log('收到响应:', response);
                    console.log('响应状态:', response.status);
                    return response.json();
                })
                .then(data => {
                    console.log('获取到数据:', data);
                    // 打印所有数据字段
                    console.log('本地温度:', data.temp);
                    console.log('本地湿度:', data.humidity);
                    console.log('报警状态:', data.alarm);
                    console.log('天气温度:', data.weather_temp);
                    console.log('天气湿度:', data.weather_hum);
                    console.log('天气状况:', data.weather_text);
                    
                    // 更新本地环境数据
                    if (data.temp && data.temp !== '未知') {
                        console.log('更新本地温度为:', data.temp);
                        document.getElementById('local-temp').textContent = data.temp;
                    } else {
                        console.log('本地温度数据无效:', data.temp);
                    }
                    if (data.humidity && data.humidity !== '未知') {
                        console.log('更新本地湿度为:', data.humidity);
                        document.getElementById('local-humidity').textContent = data.humidity;
                    } else {
                        console.log('本地湿度数据无效:', data.humidity);
                    }
                    
                    // 更新报警状态
                    const alarmStatus = document.getElementById('alarm-status');
                    if (data.alarm) {
                        console.log('更新报警状态为:', data.alarm);
                        alarmStatus.innerHTML = `<i class="fa fa-check-circle mr-1"></i> ${data.alarm}`;
                        alarmStatus.className = data.alarm === '高温报警' ? 'text-sm font-medium text-danger flex items-center' : 'text-sm font-medium text-success flex items-center';
                    } else {
                        console.log('报警状态数据无效:', data.alarm);
                    }
                    
                    // 更新天气数据
                    if (data.weather_temp !== undefined && data.weather_temp !== '未知') {
                        console.log('更新天气温度为:', data.weather_temp);
                        document.getElementById('weather-temp').textContent = data.weather_temp;
                    } else {
                        console.log('天气温度数据无效:', data.weather_temp);
                    }
                    if (data.weather_hum !== undefined && data.weather_hum !== '未知') {
                        console.log('更新天气湿度为:', data.weather_hum);
                        document.getElementById('weather-hum').textContent = data.weather_hum;
                    } else {
                        console.log('天气湿度数据无效:', data.weather_hum);
                    }
                    if (data.weather_text !== undefined && data.weather_text !== '未知') {
                        console.log('更新天气状况为:', data.weather_text);
                        document.getElementById('weather-text').textContent = data.weather_text;
                    } else {
                        console.log('天气状况数据无效:', data.weather_text);
                    }
                    
                    // 更新图表数据
                    updateChart(data);
                    
                    // 更新进度条
                    updateProgressBars(data);
                    
                    // 更新最后更新时间
                    updateLastUpdate();
                })
                .catch(error => {
                    console.error('获取数据失败:', error);
                    document.getElementById('update-status').innerHTML = '<i class="fa fa-exclamation-circle mr-1"></i> 连接失败';
                    document.getElementById('update-status').className = 'text-sm font-medium text-danger flex items-center';
                });
        }

        // 更新最后更新时间
        function updateLastUpdate() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN');
            document.getElementById('last-update').textContent = `上次更新：${timeString}`;
        }

        // 发送控制指令
        function sendCmd(cmd) {
            console.log('发送控制指令:', cmd);
            fetch('http://localhost:5000/api/send_cmd', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ cmd: cmd })
            })
            .then(response => {
                console.log('收到指令响应:', response);
                return response.json();
            })
            .then(data => {
                console.log('指令响应数据:', data);
                const cmdMsg = document.getElementById('cmd-msg');
                cmdMsg.textContent = data.msg;
                cmdMsg.className = data.status === 'success' ? 'text-sm text-success' : 'text-sm text-danger';
                
                // 2秒后清空消息
                setTimeout(() => {
                    cmdMsg.textContent = '';
                }, 2000);
            })
            .catch(error => {
                console.error('发送指令失败:', error);
                document.getElementById('cmd-msg').textContent = '发送指令失败';
                document.getElementById('cmd-msg').className = 'text-sm text-danger';
            });
        }

        // 图表实例
        let environmentChart;
        // 历史数据12
        const historyData = {
            labels: [],
            localTemp: [],
            weatherTemp: [],
            localHumidity: [],
            weatherHumidity: []
        };
        
        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('environment-chart').getContext('2d');
            environmentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyData.labels,
                    datasets: [
                        {
                            label: '本地温度 (℃)',
                            data: historyData.localTemp,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '室外温度 (℃)',
                            data: historyData.weatherTemp,
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '本地湿度 (%)',
                            data: historyData.localHumidity,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            yAxisID: 'y1'
                        },
                        {
                            label: '室外湿度 (%)',
                            data: historyData.weatherHumidity,
                            borderColor: '#06b6d4',
                            backgroundColor: 'rgba(6, 182, 212, 0.1)',
                            borderWidth: 2,
                            tension: 0.4,
                            fill: true,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: '温度 (℃)'
                            }
                        },
                        y1: {
                            beginAtZero: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: '湿度 (%)'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        }
                    }
                }
            });
        }
        
        // 更新图表数据
        function updateChart(data) {
            const now = new Date();
            const timeLabel = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            
            // 添加新数据
            historyData.labels.push(timeLabel);
            historyData.localTemp.push(parseFloat(data.temp) || null);
            historyData.weatherTemp.push(parseFloat(data.weather_temp) || null);
            historyData.localHumidity.push(parseFloat(data.humidity) || null);
            historyData.weatherHumidity.push(parseFloat(data.weather_hum) || null);
            
            // 保持数据点数量在10个以内
            if (historyData.labels.length > 10) {
                historyData.labels.shift();
                historyData.localTemp.shift();
                historyData.weatherTemp.shift();
                historyData.localHumidity.shift();
                historyData.weatherHumidity.shift();
            }
            
            // 更新图表
            if (environmentChart) {
                environmentChart.update();
            }
        }
        
        // 更新进度条
        function updateProgressBars(data) {
            // 本地温度进度条（假设温度范围 0-40℃）
            if (data.temp && data.temp !== '未知') {
                const tempValue = parseFloat(data.temp);
                const tempProgress = Math.min(Math.max((tempValue / 40) * 100, 0), 100);
                document.getElementById('temp-progress').style.width = tempProgress + '%';
            }
            
            // 本地湿度进度条（假设湿度范围 0-100%）
            if (data.humidity && data.humidity !== '未知') {
                const humidityValue = parseFloat(data.humidity);
                const humidityProgress = Math.min(Math.max(humidityValue, 0), 100);
                document.getElementById('humidity-progress').style.width = humidityProgress + '%';
            }
            
            // 室外温度进度条（假设温度范围 0-40℃）
            if (data.weather_temp && data.weather_temp !== '未知') {
                const weatherTempValue = parseFloat(data.weather_temp);
                const weatherTempProgress = Math.min(Math.max((weatherTempValue / 40) * 100, 0), 100);
                document.getElementById('weather-temp-progress').style.width = weatherTempProgress + '%';
            }
        }
        
        // 获取AI建议
        function getAISuggestion() {
            fetch('http://localhost:5000/api/data')
                .then(response => response.json())
                .then(data => {
                    // 通过后端 API 获取 AI 建议
                    return fetch('http://localhost:5000/api/ai_chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: '请根据当前环境数据，为我提供开关窗的建议，用简短的一段话回答',
                            environment: data
                        })
                    });
                })
                .then(response => response.json())
                .then(data => {
                    const aiResponse = (data.response || '').trim();
                    const aiSuggestionElement = document.getElementById('ai-suggestion');
                    
                    // 清空加载状态，显示AI建议
                    aiSuggestionElement.innerHTML = `
                        <div class="font-medium text-purple-700 mb-2">${aiResponse.split('\n')[0].trim()}</div>
                        <div class="text-sm text-gray-600 pl-4 border-l-2 border-purple-200">
                            ${aiResponse.split('\n').slice(1).filter(line => line.trim()).join('<br>')}
                        </div>
                    `;
                })
                .catch(error => {
                    console.error('获取AI建议失败:', error);
                    const aiSuggestionElement = document.getElementById('ai-suggestion');
                    aiSuggestionElement.innerHTML = `
                        <div class="text-center text-danger flex flex-col items-center">
                            <i class="fa fa-exclamation-circle text-xl mb-2"></i>
                            <p>获取AI建议失败，请稍后重试。</p>
                        </div>
                    `;
                });
        }
        
        // 初始化
        function init() {
            // 初始化图表
            initChart();
            
            // 更新当前时间
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000);
            
            // 初始获取数据
            fetchData();
            // 每3秒获取一次数据
            setInterval(fetchData, 3000);
            
            // 每30秒获取一次AI建议
            getAISuggestion();
            setInterval(getAISuggestion, 30000);
            
            // 绑定按钮事件
            document.getElementById('open-window').addEventListener('click', () => sendCmd('open_window'));
            document.getElementById('close-window').addEventListener('click', () => sendCmd('close_window'));
            document.getElementById('auto-mode').addEventListener('click', () => sendCmd('auto_mode'));
            document.getElementById('ai-mode').addEventListener('click', () => sendCmd('ai_mode'));
            
            // AI 聊天功能
            document.getElementById('ai-chat').addEventListener('click', () => {
                document.getElementById('ai-chat-modal').classList.remove('hidden');
            });
            
            document.getElementById('close-ai-modal').addEventListener('click', () => {
                document.getElementById('ai-chat-modal').classList.add('hidden');
            });
            
            document.getElementById('send-message').addEventListener('click', sendChatMessage);
            
            document.getElementById('chat-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendChatMessage();
                }
            });
        }
        
        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息到聊天界面
            addMessage('user', message);
            input.value = '';
            
            // 显示AI思考状态在聊天窗口中
            showAITypingIndicator();
            
            // 获取当前环境数据
            fetch('http://localhost:5000/api/data')
                .then(response => response.json())
                .then(data => {
                    // 发送消息到后端 API
                    return fetch('http://localhost:5000/api/ai_chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: message,
                            environment: data
                        })
                    });
                })
                .then(response => response.json())
                .then(data => {
                    // 移除AI思考状态
                    removeAITypingIndicator();
                    
                    // 添加 AI 回复到聊天界面
                    addMessage('ai', data.response);
                })
                .catch(error => {
                    console.error('发送消息失败:', error);
                    removeAITypingIndicator();
                    addMessage('ai', '抱歉，我暂时无法处理你的请求，请稍后再试。');
                });
        }
        
        function addMessage(type, text) {
            const chatMessages = document.getElementById('chat-messages');
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            if (type === 'user') {
                // 用户消息
                const messageDiv = document.createElement('div');
                messageDiv.className = 'flex items-start justify-end';
                messageDiv.innerHTML = `
                    <div class="bg-purple-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">${text}</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center ml-3 flex-shrink-0">
                        <i class="fa fa-user text-blue-600"></i>
                    </div>
                `;
                chatMessages.appendChild(messageDiv);
            } else {
                // AI 消息
                const messageDiv = document.createElement('div');
                messageDiv.className = 'flex items-start';
                messageDiv.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center mr-3 flex-shrink-0">
                        <i class="fa fa-robot text-purple-600"></i>
                    </div>
                    <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">${text}</p>
                    </div>
                `;
                chatMessages.appendChild(messageDiv);
            }
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 显示AI思考状态
        function showAITypingIndicator() {
            const chatMessages = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'ai-typing-indicator';
            typingDiv.className = 'flex items-start';
            typingDiv.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center mr-3 flex-shrink-0">
                    <i class="fa fa-robot text-purple-600"></i>
                </div>
                <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                    <div style="display: flex; align-items: center;">
                        <span class="text-gray-800">AI正在思考...</span>
                        <div style="display: flex; margin-left: 10px;">
                            <div class="w-2 h-2 rounded-full bg-purple-500 mx-1 animate-bounce" style="animation-delay: 0ms;"></div>
                            <div class="w-2 h-2 rounded-full bg-purple-500 mx-1 animate-bounce" style="animation-delay: 150ms;"></div>
                            <div class="w-2 h-2 rounded-full bg-purple-500 mx-1 animate-bounce" style="animation-delay: 300ms;"></div>
                        </div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 移除AI思考状态
        function removeAITypingIndicator() {
            const typingIndicator = document.getElementById('ai-typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
